services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: engine/Dockerfile
    env_file:
      - ./engine/.env
    depends_on:
      - redis
    restart: unless-stopped
